name: restaurant-manager

services:
  db:
    image: postgres:16-alpine
    container_name: restaurant-manager-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: restaurant_manager
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d restaurant_manager"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrator:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    container_name: restaurant-manager-migrator
    working_dir: /src
    volumes:
      - ./:/src
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      NUGET_XMLDOC_MODE: skip
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=restaurant_manager;Username=postgres;Password=admin
    depends_on:
      db:
        condition: service_healthy
    command: >
      bash -lc
      "dotnet tool install --global dotnet-ef --version 10.0.7 || dotnet tool update --global dotnet-ef --version 10.0.7 &&
       export PATH=\"$PATH:/root/.dotnet/tools\" &&
       dotnet restore RestaurantManager.Api/RestaurantManager.Api.csproj &&
       dotnet ef database update --project RestaurantManager.Infrastructure --startup-project RestaurantManager.Api"
    restart: "no"

  api:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    container_name: restaurant-manager-api
    working_dir: /src
    volumes:
      - ./:/src
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      NUGET_XMLDOC_MODE: skip
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=restaurant_manager;Username=postgres;Password=admin
    ports:
      - "5000:8080"
    depends_on:
      db:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    command: >
      bash -lc
      "dotnet restore RestaurantManager.Api/RestaurantManager.Api.csproj &&
       dotnet run --project RestaurantManager.Api/RestaurantManager.Api.csproj --no-restore --urls http://0.0.0.0:8080"

volumes:
  pgdata:
